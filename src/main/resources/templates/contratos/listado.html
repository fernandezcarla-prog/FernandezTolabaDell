<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contratos</title>
</head>
<body>

<h1>Gestión de Contratos</h1>

<p>
    <a th:href="@{/}">Volver al inicio</a>
</p>

<p>
    <a th:href="@{/contratos/nuevo}">Nuevo contrato</a>
</p>

<div th:if="${mensaje}">
    <p style="color: green;" th:text="${mensaje}"></p>
</div>

<div th:if="${error}">
    <p style="color: red;" th:text="${error}"></p>
</div>

<h2>Filtros</h2>

<form th:action="@{/contratos}" method="get">
    <label>Propiedad:</label>
    <select name="propiedadId">
        <option value="">Todas</option>
        <option th:each="propiedad : ${propiedades}"
                th:value="${propiedad.id}"
                th:text="${propiedad.direccion + ' - ' + propiedad.ciudad}"
                th:selected="${propiedadId != null and propiedadId == propiedad.id}">
        </option>
    </select>

    <label>Inquilino:</label>
    <select name="inquilinoId">
        <option value="">Todos</option>
        <option th:each="persona : ${personas}"
                th:value="${persona.id}"
                th:text="${persona.nombreCompleto}"
                th:selected="${inquilinoId != null and inquilinoId == persona.id}">
        </option>
    </select>

    <label>Estado:</label>
    <select name="estadoContrato">
        <option value="">Todos</option>
        <option th:each="estado : ${estadosContrato}"
                th:value="${estado}"
                th:text="${estado}"
                th:selected="${estadoContrato == estado}">
        </option>
    </select>

    <label>Fecha inicio:</label>
    <input type="date" name="fechaInicio" th:value="${fechaInicio}">

    <button type="submit">Buscar</button>
    <a th:href="@{/contratos}">Limpiar</a>
</form>

<h2>Listado</h2>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th>
            <th>Propiedad</th>
            <th>Propietario</th>
            <th>Inquilino</th>
            <th>Fecha inicio</th>
            <th>Duración</th>
            <th>Importe mensual</th>
            <th>Vencimiento</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="contrato : ${contratos}">
            <td th:text="${contrato.id}"></td>

            <td th:text="${contrato.propiedad != null ? contrato.propiedad.direccion + ' - ' + contrato.propiedad.ciudad : 'Sin propiedad'}"></td>

            <td th:text="${contrato.propiedad != null and contrato.propiedad.propietario != null ? contrato.propiedad.propietario.nombreCompleto : 'Sin propietario'}"></td>

            <td th:text="${contrato.inquilino != null ? contrato.inquilino.nombreCompleto : 'Sin inquilino'}"></td>

            <td th:text="${contrato.fechaInicio}"></td>

            <td th:text="${contrato.duracionMeses + ' meses'}"></td>

            <td th:text="${contrato.importeMensual}"></td>

            <td th:text="${contrato.diaVencimientoMensual}"></td>

            <td th:text="${contrato.estadoContrato}"></td>

            <td>
                <a th:href="@{/contratos/editar/{id}(id=${contrato.id})}">Editar</a>

                <form th:action="@{/contratos/eliminar/{id}(id=${contrato.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit"
                            onclick="return confirm('¿Seguro que desea eliminar este contrato?');">
                        Eliminar
                    </button>
                </form>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(contratos)}">
            <td colspan="10">No hay contratos registrados.</td>
        </tr>
    </tbody>
</table>

</body>
</html>
