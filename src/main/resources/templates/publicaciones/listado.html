<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicaciones</title>
</head>
<body>

<h1>Gestión de Publicaciones</h1>

<p>
    <a th:href="@{/}">Volver al inicio</a>
</p>

<p>
    <a th:href="@{/publicaciones/nueva}">Nueva publicación</a>
</p>

<div th:if="${mensaje}">
    <p th:text="${mensaje}" style="color: green;"></p>
</div>

<div th:if="${error}">
    <p th:text="${error}" style="color: red;"></p>
</div>

<h2>Filtros</h2>

<form th:action="@{/publicaciones}" method="get">

    <label>Propiedad:</label>
    <select name="propiedadId">
        <option value="">Todas</option>
        <option th:each="propiedad : ${propiedades}"
                th:value="${propiedad.id}"
                th:text="${propiedad.direccion + ' - ' + propiedad.ciudad}"
                th:selected="${propiedadId != null and propiedad.id == propiedadId}">
        </option>
    </select>

    <label>Ciudad:</label>
    <input type="text" name="ciudad" th:value="${ciudad}">

    <label>Estado:</label>
    <select name="estado">
        <option value="">Todos</option>
        <option th:each="estadoItem : ${estadosPublicacion}"
                th:value="${estadoItem}"
                th:text="${estadoItem}"
                th:selected="${estadoItem == estado}">
        </option>
    </select>

    <label>Precio mínimo:</label>
    <input type="number" step="0.01" name="precioMin" th:value="${precioMin}">

    <label>Precio máximo:</label>
    <input type="number" step="0.01" name="precioMax" th:value="${precioMax}">

    <button type="submit">Buscar</button>
    <a th:href="@{/publicaciones}">Limpiar</a>

</form>

<h2>Listado</h2>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Propiedad</th>
        <th>Ciudad</th>
        <th>Precio mensual</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="publicacion : ${publicaciones}">
        <td th:text="${publicacion.id}"></td>
        <td th:text="${publicacion.propiedad.direccion}"></td>
        <td th:text="${publicacion.propiedad.ciudad}"></td>
        <td th:text="${publicacion.precioMensual}"></td>
        <td th:text="${publicacion.fechaPublicacion}"></td>
        <td th:text="${publicacion.estadoPublicacion}"></td>
        <td>
            <a th:href="@{/publicaciones/editar/{id}(id=${publicacion.id})}">Editar</a>

            <form th:action="@{/publicaciones/eliminar/{id}(id=${publicacion.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
