<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Persona</title>
</head>
<body>

<h1>Nueva Persona</h1>

<form th:object="${persona}" th:action="@{/personas/guardar}" method="post">

    <p>
        <label>Apellido:</label><br>
        <input type="text" th:field="*{apellido}">
        <span style="color:red;" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
    </p>

    <p>
        <label>Nombre:</label><br>
        <input type="text" th:field="*{nombre}">
        <span style="color:red;" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </p>

    <p>
        <label>Email:</label><br>
        <input type="email" th:field="*{email}">
        <span style="color:red;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </p>

    <p>
        <label>Teléfono:</label><br>
        <input type="text" th:field="*{telefono}">
    </p>

    <p>
        <button type="submit">Guardar</button>
        <a th:href="@{/personas}">Cancelar</a>
    </p>

</form>

</body>
</html>
