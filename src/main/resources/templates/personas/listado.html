<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Personas</title>
</head>
<body>

<h1>Listado de Personas</h1>

<p>
    <a th:href="@{/personas/nueva}">Nueva persona</a>
</p>

<div th:if="${mensaje}">
    <p style="color: green;" th:text="${mensaje}"></p>
</div>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th>
            <th>Apellido</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="persona : ${personas}">
            <td th:text="${persona.id}"></td>
            <td th:text="${persona.apellido}"></td>
            <td th:text="${persona.nombre}"></td>
            <td th:text="${persona.email}"></td>
            <td th:text="${persona.telefono}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(personas)}">
            <td colspan="5">No hay personas registradas.</td>
        </tr>
    </tbody>
</table>

<p>
    <a th:href="@{/}">Volver al inicio</a>
</p>

</body>
</html>
